<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --secondary: #8b5cf6;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-main {
            max-width: 1200px;
            margin: 40px auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 30px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .btn-primary-custom {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-primary-custom:hover {
            background: #4f46e5;
            color: white;
        }

        .task-item {
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: #ffffff;
            transform: translateX(5px);
        }

        .priority-urgent {
            border-left-color: var(--danger);
        }

        .priority-important {
            border-left-color: var(--warning);
        }

        .priority-normal {
            border-left-color: var(--secondary);
        }

        .priority-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .priority-badge.urgent {
            background: #fee2e2;
            color: var(--danger);
        }

        .priority-badge.important {
            background: #fef3c7;
            color: var(--warning);
        }

        .priority-badge.normal {
            background: #e9d5ff;
            color: var(--secondary);
        }

        .stats-box {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stats-box h3 {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
        }

        .stats-box p {
            margin: 10px 0 0 0;
            opacity: 0.95;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner.active {
            display: block;
        }

        .daily-plan {
            background: #f0f4ff;
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .daily-plan ol {
            margin: 10px 0 0 0;
            padding-left: 20px;
        }

        .daily-plan li {
            margin: 8px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Header -->
        <div class="header">
            <h1>🚀 AI Productivity Agent</h1>
            <p>Organize, Prioritize, Execute</p>
        </div>

        <!-- Main Content -->
        <div class="row">
            <!-- Left Column: Task Input & Stats -->
            <div class="col-lg-4">
                <!-- Add Task Card -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Add New Task</h5>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="taskTitle" placeholder="Task title">
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" id="taskDescription" placeholder="Description (optional)" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <input type="date" class="form-control" id="taskDueDate">
                        </div>
                        <button class="btn btn-primary-custom w-100" onclick="addTask()">Add Task</button>
                    </div>
                </div>

                <!-- Stats Card -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Today's Stats</h5>
                        <div id="statsContainer"></div>
                        <button class="btn btn-primary-custom w-100 mt-3" onclick="generateDailyPlan()">Generate Daily Plan</button>
                        <button class="btn btn-outline-secondary w-100 mt-2" onclick="generateWeeklyReport()">Weekly Report</button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Tasks & Plan -->
            <div class="col-lg-8">
                <!-- Daily Plan -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">📋 Today's Optimized Plan</h5>
                        <div id="dailyPlanContainer" class="spinner active">
                            <p class="text-muted">Click "Generate Daily Plan" to see AI recommendations</p>
                        </div>
                    </div>
                </div>

                <!-- Pending Tasks -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">📝 All Tasks</h5>
                        <div class="mb-3">
                            <select class="form-select form-select-sm" id="filterStatus" onchange="loadTasks()">
                                <option value="">All Tasks</option>
                                <option value="pending">Pending</option>
                                <option value="in_progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div id="tasksContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
